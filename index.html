<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
</head>
<body>
  <script>
    const userAgent = navigator.userAgent || navigator.vendor;

    const playStoreUrl = "https://play.google.com/store/apps/details?id=com.nextbrain.fit_city&pcampaignid=web_share";
    const appStoreUrl = "https://apps.apple.com/uz/app/fitcity-uz/id6752466966";
    const fallbackUrl = playStoreUrl; // default

    if (/android/i.test(userAgent)) {
      window.location.href = playStoreUrl;
    } else if (/iPad|iPhone|iPod/.test(userAgent)) {
      window.location.href = appStoreUrl;
    } else {
      window.location.href = fallbackUrl;
    }
  </script>
  <p>Redirecting to app store...</p>
</body>
</html>
